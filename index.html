<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/vite.svg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>wp-blocks</title>
</head>
<body>

<div class="header">
  <h1>WordPress Blocks Live Tester</h1>
  <p>Click on any block to test it live in your browser!</p>
  <div class="search-container">
    <input type="text" id="search-input" placeholder="Search blocks..." class="search-input">
  </div>
</div>

<div id="loading" class="loading">Fetching blocks from WordPress.org...</div>
<div id="block-grid" class="block-grid"></div>

<div id="playground-modal" class="modal-overlay">
  <div class="modal-content">
    <button id="close-modal" class="close-btn">Close Preview</button>
    <iframe id="playground-iframe" src=""></iframe>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
